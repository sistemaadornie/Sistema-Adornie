name: operon_mobile
description: Agenda Adornie - Gestão de Agendamentos para Salões

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  dio: ^5.7.0

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Secure Storage
  flutter_secure_storage: ^9.2.2

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^0.69.0
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.19.0
  image_picker: ^1.1.2
  # Upload de mídias offline-first
  sqflite: ^2.4.1
  path: ^1.9.0
  connectivity_plus: ^6.1.4
  crypto: ^3.0.6
  timeago: ^3.7.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
